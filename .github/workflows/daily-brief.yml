name: Daily Brief

on:
  schedule:
    # 매일 KST 07:00 = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --quiet requests beautifulsoup4 python-dotenv lxml

      - name: Collect news data
        run: |
          python3 run.py

      - name: Run Claude analysis & send to Slack
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 40"
          prompt: |
            You are 강태양's morning intelligence agent.

            # CRITICAL RULES (READ FIRST)
            - DO NOT commit, push, create branches, or open PRs. None.
            - DO NOT modify any file in the repo.
            - Only allowed: read files, run bash, web_search, curl POST to Slack.

            # CONTEXT
            Read BRIEFING_CONTEXT.md to understand 강태양's profile and style.

            # DATA
            Pre-collected. Read these:
            - data/hn.json (Hacker News today)
            - data/naver.json (Naver rankings)

            # ANALYZE (BE EFFICIENT)
            - Pick 3-5 most important items for 강태양 today
            - Use web_search SPARINGLY — max 3 searches total
            - Skip irrelevant items quickly
            - Aim to finish analysis within 15 turns

            # COMPOSE BRIEFING IN KOREAN
            Slack Block Kit format:
            - Header: ☀️ [날짜] 종합 브리핑
            - 🎯 오늘의 핵심 (2-3 sentences)
            - Categorized sections (only if relevant news exists):
              - 💻 기술 / AI
              - 💰 핀테크 / 경제
              - 🇰🇷 한국 시장
              - 🚬 헬스테크 / 금연
            - 💡 오늘 한 줄: [single insight]

            For each item: bold title with link, 2-3 line Korean summary, optional "→ 태양님 관점:" line.
            Total under 3500 characters.

            # SEND TO SLACK (DO THIS IN ONE BASH COMMAND)
            Save payload to /tmp/payload.json first, then send:

            cat > /tmp/payload.json << 'EOF'
            {"text":"...","blocks":[...]}
            EOF
            curl -X POST -H 'Content-type: application/json' --data @/tmp/payload.json "$SLACK_WEBHOOK_URL"

            Verify response is "ok".

            # REPORT
            Briefly print: items analyzed, web_searches performed, Slack response.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
