name: Daily Brief

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --quiet requests beautifulsoup4 python-dotenv lxml

      - name: Collect news data
        run: python3 run.py

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Claude CLI
        run: claude --version

      - name: Run Claude analysis & send to Slack
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          claude -p "$(cat <<'PROMPT'
          You are 강태양's morning intelligence agent.

          # CRITICAL RULES
          - DO NOT commit, push, create branches, or open PRs.
          - DO NOT modify any file in the repo.
          - Only allowed: read files, run bash, web_search, curl POST to Slack.

          # CONTEXT
          Read BRIEFING_CONTEXT.md to understand 강태양's profile and preferred briefing style.

          # DATA (PRE-COLLECTED)
          Read these JSON files:
          - data/hn.json (Hacker News today's top items)
          - data/naver.json (Naver news rankings)

          # ANALYZE (BE EFFICIENT)
          - Pick 3-5 most important items for 강태양 today
          - Use WebSearch SPARINGLY — max 3 searches total
          - Skip items not relevant to his interests (QuitBank, indie app dev, Korean fintech, AI tooling, healthtech)

          # COMPOSE BRIEFING IN KOREAN
          Write a Slack Block Kit message in Korean.

          Structure:
          - Header: ☀️ [날짜] 종합 브리핑
          - 🎯 오늘의 핵심 (2-3 sentences)
          - Categorized sections (only if relevant news exists):
            * 💻 기술 / AI
            * 💰 핀테크 / 경제
            * 🇰🇷 한국 시장
            * 🚬 헬스테크 / 금연
          - 💡 오늘 한 줄: [single sharp insight]

          For each item: bold title with link, 2-3 line Korean summary, optional "→ 태양님 관점:" line.
          Total under 3500 characters.

          # SEND TO SLACK
          Save payload to /tmp/payload.json then send:

          cat > /tmp/payload.json << 'EOF'
          {"text":"...","blocks":[...]}
          EOF
          curl -X POST -H 'Content-type: application/json' --data @/tmp/payload.json "\$SLACK_WEBHOOK_URL"

          Verify response is "ok".

          # REPORT
          Briefly print: items analyzed, web searches performed, Slack response.
          PROMPT
          )" \
            --allowedTools "Read,Bash,WebSearch,WebFetch" \
            --output-format text
