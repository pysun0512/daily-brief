name: Daily Brief

on:
  schedule:
    - cron: '0 22 * * *'  # KST 07:00 = UTC 22:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --quiet requests beautifulsoup4 python-dotenv lxml feedparser pyyaml

      - name: Collect news data
        run: python3 run.py

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Claude CLI
        run: claude --version

      - name: Run Claude analysis & send to Slack
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # KST 기준 오늘 날짜 명시 (Claude가 헷갈리지 않게)
          export TODAY_KST=$(date +"%Y년 %m월 %d일")
          echo "오늘 날짜 (KST): $TODAY_KST"
          
          claude -p "$(cat <<'PROMPT'
          You are a morning intelligence agent.
          
          # CRITICAL RULES
          - DO NOT commit, push, create branches, or open PRs.
          - DO NOT modify any file in the repo.
          - Only allowed: read files, run bash, web_search, curl POST to Slack.

          # CONTEXT
          Read BRIEFING_CONTEXT.md for tone, structure, and source-tier guidance.
          
          # DATE
          Today's date in KST is in environment variable TODAY_KST.
          Use this exact value in the briefing header. Do NOT compute date yourself.
          Verify with: bash command `echo $TODAY_KST`

          # DATA (PRE-COLLECTED)
          Read the following JSON files. Each contains items from authoritative sources, filtered to last 24 hours:
          
          - data/hn.json — Hacker News top items (tech curation)
          - data/naver.json — Naver news rankings (Korean economy/politics/IT)
          - data/rss_economy.json — Global economy/markets (FT, BBC)
          - data/rss_korea_economy.json — Korean economy (한경, 매경, 연합)
          - data/rss_politics.json — Politics (BBC, 연합)
          - data/rss_ai.json — AI primary sources (Anthropic, OpenAI) ⭐
          - data/rss_tech.json — Global tech (TechCrunch)
          - data/rss_tech_korea.json — Korean tech (전자신문, 디지털데일리)
          
          Some files may have 0 items if no news in last 24h. That's okay — skip empty.

          # ANALYZE
          - Identify 3-5 most important items overall (across all categories)
          - Tech/AI section deserves MORE depth than others (per BRIEFING_CONTEXT.md)
          - Use WebSearch SPARINGLY — max 3 searches, only when you need critical context for a major story
          - Prioritize tier-1 sources (FT, Reuters-equivalent, Anthropic/OpenAI direct, Korean tier-1 매체) over tier-3
          - When multiple sources cover same event, pick the most authoritative as primary
          - Look for analysis/forecast content (analyst reports, market predictions) — highlight these

          # COMPOSE BRIEFING IN KOREAN
          Write a Slack Block Kit message in Korean. Compressed structure (morning, time-sensitive):

          ☀️ {TODAY_KST} 종합 브리핑

          🎯 오늘의 핵심
          [1-2 sentences: most important takeaway across everything]

          💰 경제 / 시장
          [2-3 items: global + Korea blended]
          → 변화/예측: [1 line if there's relevant analysis/forecast]

          🏛️ 정치 / 정책
          [1-2 items max]

          🤖 기술 / AI ⭐
          [3-4 items, deeper analysis]
          [For each: title + 2-3 line summary + tech/industry implication]

          💡 한 줄: [meta insight or pattern of the day]

          For each news item:
          - Bold title with link
          - 2-3 line Korean summary
          - For analysis/forecast items, add "→ 시사점:" line

          Total under 3500 characters.

          # SEND TO SLACK
          Save your composed JSON payload to /tmp/payload.json first, then send:

          cat > /tmp/payload.json << 'EOF'
          {"text":"...fallback...","blocks":[...]}
          EOF
          curl -X POST -H 'Content-type: application/json' --data @/tmp/payload.json "\$SLACK_WEBHOOK_URL"

          The SLACK_WEBHOOK_URL and TODAY_KST environment variables are already set.
          Verify the response is "ok".

          # REPORT
          Briefly print:
          - TODAY_KST value used
          - Number of items analyzed per category
          - WebSearch count
          - Slack response status
          PROMPT
          )" \
            --allowedTools "Read,Bash,WebSearch,WebFetch" \
            --output-format text
